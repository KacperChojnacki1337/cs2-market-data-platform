version: 2

models:
  - name: dim_assets
    description: "Asset dimension — what you own and at what purchase price"
    columns:
      - name: asset_sk
        description: "Surrogate key generated by dbt"
        tests:
          - unique
          - not_null
      - name: asset_id
        tests:
          - not_null
      - name: item_id
        tests:
          - not_null

  - name: fct_portfolio
    description: "Portfolio fact table — current value and unrealized PnL per asset"
    columns:
      - name: asset_sk
        tests:
          - unique
          - not_null
      - name: current_price_usd
        tests:
          - not_null
      - name: usd_pln_rate
        tests:
          - not_null

  - name: fct_realized_pnl
    description: "Realized PnL on closed positions — joins buy events with matching sell events by item_id"
    columns:
      - name: buy_asset_id
        tests:
          - not_null
      - name: item_id
        tests:
          - not_null
      - name: buy_price_pln
        tests:
          - not_null
      - name: sell_price_pln
        tests:
          - not_null
      - name: realized_pnl_pln
        tests:
          - not_null
      - name: holding_period_days
        tests:
          - not_null

  - name: fct_portfolio_history
    description: "Daily portfolio value snapshots — enables time-series charts in Looker Studio"
    columns:
      - name: snapshot_date
        tests:
          - unique
          - not_null
      - name: portfolio_value_pln
        tests:
          - not_null
      - name: active_positions
        tests:
          - not_null