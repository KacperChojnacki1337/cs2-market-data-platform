version: 2

models:
  - name: dim_assets
    description: "Asset dimension — what you own and at what purchase price"
    columns:
      - name: asset_sk
        description: "Surrogate key generated by dbt"
        tests:
          - unique
          - not_null
      - name: asset_id
        tests:
          - not_null
      - name: item_id
        tests:
          - not_null

  - name: fct_portfolio
    description: "Portfolio fact table — current value, unrealized PnL, and Steam net value per active position"
    columns:
      - name: asset_sk
        tests:
          - unique
          - not_null
      - name: current_price_usd
        tests:
          - not_null:
              severity: warn
      - name: usd_pln_rate
        tests:
          - not_null
      - name: net_value_steam_pln
        description: "Estimated net value if sold on Steam today (gross × 0.85, after 15% Steam fee)"
        tests:
          - not_null:
              severity: warn
      - name: net_pnl_steam_pln
        description: "Estimated net PnL if sold on Steam today (net_value_steam_pln - buy_price_pln)"
      - name: real_cash_coeff
        description: "Per-category CSFloat coefficient (Knife=0.83, Gloves=0.80, Skin/Case=0.74, Agent=0.60, Sticker=0.49, Other=0.65)"
        tests:
          - not_null
      - name: real_cash_value_pln
        description: "Real cash value if sold on CSFloat today (current_value_pln × real_cash_coeff)"
        tests:
          - not_null:
              severity: warn
      - name: real_cash_pnl_pln
        description: "Real cash PnL if sold on CSFloat today (real_cash_value_pln - total_cost_pln)"
      - name: real_cash_pnl_pct
        description: "Real cash PnL % if sold on CSFloat today"
      - name: skinport_price_pln
        description: "Skinport market price in PLN (actual marketplace rate if available, NULL if item unlisted)"
        tests:
          - not_null:
              severity: warn
      - name: skinport_pnl_pln
        description: "PnL if sold on Skinport today (skinport_price_pln - buy_price_pln) × quantity"
      - name: skinport_pnl_pct
        description: "PnL % if sold on Skinport today"
      - name: net_value_skinport_pln
        description: "Estimated net value if sold on Skinport today (skinport_price_pln × quantity × 0.92, after 8% standard Skinport fee)"
      - name: net_skinport_pnl_pln
        description: "Net PnL if sold on Skinport today, after 8% fee: (skinport_price_pln × 0.92 - buy_price_pln) × quantity"
      - name: net_skinport_pnl_pct
        description: "Net PnL % if sold on Skinport today, after 8% fee"
      - name: coeff_accuracy
        description: "Accuracy of real_cash_coeff: (Steam price USD × rate × coeff) / Skinport price PLN. Values ~1.0 mean coeff is accurate; >1.0 means pessimistic; <1.0 means optimistic"
      - name: volume_7d
        description: "7-day trade volume from Steam Market (sales count, 0 if no recent sales)"
      - name: liquidity_risk
        description: "Liquidity indicator: LOW (<5 sales/7d), MEDIUM (5-50 sales/7d), HIGH (>50 sales/7d). Low volume = hard to sell at market price"

  - name: fct_realized_pnl
    description: "Realized PnL on closed positions (FIFO). Grain: one row per (sale × buy lot) allocation. Fee derived from sell_channel (Steam 15%, CSFloat 2%, Skinport 8%)."
    columns:
      - name: realized_sk
        description: "Surrogate key over (sell_id, buy_asset_id)"
        tests:
          - unique
          - not_null
      - name: buy_asset_id
        description: "asset_id of the buy lot this allocation draws from (FIFO)"
        tests:
          - not_null
      - name: sell_id
        description: "asset_id of the originating sale event"
        tests:
          - not_null
      - name: item_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_assets')
              field: item_id
      - name: units_sold_from_lot
        description: "Units of this sale drawn from this specific buy lot (FIFO)"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              inclusive: true
      - name: buy_price_pln
        description: "Per-unit purchase price of the allocated lot"
        tests:
          - not_null
      - name: gross_sell_price_pln
        description: "Per-unit sell price before platform fee deduction"
        tests:
          - not_null
      - name: fee_pct
        description: "Platform fee % derived from sell_channel (Steam=15, CSFloat=2, Skinport=8)"
        tests:
          - not_null
      - name: fee_amount_pln
        description: "Per-unit fee in PLN (gross_sell_price_pln × fee_pct / 100)"
      - name: net_sell_price_pln
        description: "Per-unit sell price after platform fee (gross × (1 - fee_pct/100))"
        tests:
          - not_null
      - name: realized_pnl_pln
        description: "Total realized profit for the allocation ((net_sell_price_pln - buy_price_pln) × units_sold_from_lot)"
        tests:
          - not_null
      - name: holding_period_days
        description: "Days between buy_date and sell_date for this allocation"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
      - name: sell_channel
        description: "Platform where item was sold (Steam / CSFloat / Skinport)"
        tests:
          - not_null

  - name: fct_portfolio_history
    description: "Daily portfolio value snapshots — enables time-series charts in Looker Studio"
    columns:
      - name: snapshot_date
        tests:
          - unique
          - not_null
      - name: portfolio_value_pln
        tests:
          - not_null
      - name: active_positions
        tests:
          - not_null
      - name: real_cash_portfolio_value_pln
        description: "Total real cash portfolio value if all active positions sold on CSFloat today"
        tests:
          - not_null