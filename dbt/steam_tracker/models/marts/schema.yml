version: 2

models:
  - name: dim_assets
    description: "Asset dimension — what you own and at what purchase price"
    columns:
      - name: asset_sk
        description: "Surrogate key generated by dbt"
        tests:
          - unique
          - not_null
      - name: asset_id
        tests:
          - not_null
      - name: item_id
        tests:
          - not_null

  - name: fct_portfolio
    description: "Portfolio fact table — current value, unrealized PnL, and Steam net value per active position"
    columns:
      - name: asset_sk
        tests:
          - unique
          - not_null
      - name: current_price_usd
        tests:
          - not_null
      - name: usd_pln_rate
        tests:
          - not_null
      - name: net_value_steam_pln
        description: "Estimated net value if sold on Steam today (gross × 0.85, after 15% Steam fee)"
        tests:
          - not_null
      - name: net_pnl_steam_pln
        description: "Estimated net PnL if sold on Steam today (net_value_steam_pln - buy_price_pln)"

  - name: fct_realized_pnl
    description: "Realized PnL on closed positions — fee derived from sell_channel (Steam 15%, CSFloat 2%, Skinport 5%)"
    columns:
      - name: buy_asset_id
        tests:
          - not_null
      - name: item_id
        tests:
          - not_null
      - name: buy_price_pln
        tests:
          - not_null
      - name: gross_sell_price_pln
        description: "Sell price before platform fee deduction"
        tests:
          - not_null
      - name: fee_pct
        description: "Platform fee % derived from sell_channel (Steam=15, CSFloat=2, Skinport=5)"
        tests:
          - not_null
      - name: fee_amount_pln
        description: "Fee in PLN (gross_sell_price_pln × fee_pct / 100)"
      - name: net_sell_price_pln
        description: "Sell price after platform fee (gross × (1 - fee_pct/100))"
        tests:
          - not_null
      - name: realized_pnl_pln
        description: "Net realized profit (net_sell_price_pln - buy_price_pln)"
        tests:
          - not_null
      - name: holding_period_days
        tests:
          - not_null
      - name: sell_channel
        description: "Platform where item was sold (Steam / CSFloat / Skinport)"
        tests:
          - not_null

  - name: fct_portfolio_history
    description: "Daily portfolio value snapshots — enables time-series charts in Looker Studio"
    columns:
      - name: snapshot_date
        tests:
          - unique
          - not_null
      - name: portfolio_value_pln
        tests:
          - not_null
      - name: active_positions
        tests:
          - not_null